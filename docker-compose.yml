services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    command: ["/mediamtx.yml"]
    restart: unless-stopped

  app:
    build: .
    ports:
      - "5001:5000"
    depends_on:
      - mediamtx
    environment:
      - FLASK_ENV=development
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    restart: unless-stopped
