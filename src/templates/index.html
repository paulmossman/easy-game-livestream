<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Game Livestream Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f0e8;
            --panel: rgba(255, 252, 245, 0.94);
            --ink: #1f1a17;
            --line: rgba(31, 26, 23, 0.12);
            --green-a: #0e9a7f;
            --green-b: #0a7c66;
            --red-a: #d9643c;
            --red-b: #b84029;
            --steel-a: #4c5b65;
            --steel-b: #24323c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Avenir Next", "Helvetica Neue", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(10, 124, 102, 0.18), transparent 30%),
                radial-gradient(circle at bottom right, rgba(199, 81, 46, 0.15), transparent 28%),
                linear-gradient(135deg, #f5f1e7, #e8ece9);
        }

        .layout {
            min-height: 100vh;
            padding: 24px;
        }

        .board {
            display: grid;
            grid-template-columns: minmax(240px, 1fr) minmax(320px, 1.15fr) minmax(240px, 1fr);
            grid-template-areas:
                "toggle toggle toggle"
                "left preview right"
                "settings settings settings";
            gap: 20px;
            align-items: start;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 28px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(31, 26, 23, 0.08);
        }

        .team-panel {
            padding: 24px;
            display: grid;
            gap: 18px;
            align-content: start;
        }

        .team-flags {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .team-panel.left {
            grid-area: left;
        }

        .team-panel.right {
            grid-area: right;
        }

        .preview-panel {
            grid-area: preview;
            padding: 24px;
            display: grid;
            gap: 16px;
            align-content: start;
            align-self: stretch;
        }

        .settings-panel {
            grid-area: settings;
            padding: 24px;
            display: grid;
            gap: 16px;
            align-content: start;
        }

        .audio-panel {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(31, 26, 23, 0.05);
        }

        .youtube-panel {
            display: grid;
            gap: 14px;
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(31, 26, 23, 0.05);
        }

        .youtube-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .youtube-button,
        .channel-button {
            border: 0;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.98rem;
            font-weight: 800;
        }

        .youtube-button {
            padding: 14px 18px;
            color: white;
            background: linear-gradient(160deg, #b84029, #d9643c);
        }

        .channel-list {
            display: grid;
            gap: 10px;
        }

        .channel-button {
            width: 100%;
            padding: 14px 16px;
            text-align: left;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.74);
            border: 1px solid var(--line);
        }

        .youtube-link {
            color: var(--steel-b);
            font-weight: 800;
            text-decoration: none;
        }

        .youtube-link:hover {
            text-decoration: underline;
        }

        .audio-copy {
            display: grid;
            gap: 6px;
        }

        .audio-label {
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: rgba(31, 26, 23, 0.7);
        }

        .audio-value {
            font-size: 1.2rem;
            font-weight: 900;
        }

        .input-audio-panel {
            display: grid;
            gap: 12px;
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(31, 26, 23, 0.05);
        }

        .meter-track {
            width: 100%;
            height: 14px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(31, 26, 23, 0.12);
        }

        .meter-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--red-a), #e0a834, var(--green-a));
            transition: width 160ms ease;
        }

        .meter-fill.is-silent {
            width: 2%;
        }

        .toggle-panel {
            grid-area: toggle;
            overflow: hidden;
        }

        .team-heading {
            margin: 0;
            font-size: clamp(1.6rem, 3vw, 2.4rem);
            font-weight: 900;
            letter-spacing: 0.01em;
        }

        .team-heading.right {
            text-align: right;
        }

        label {
            display: grid;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        input,
        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 16px 18px;
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.78);
            color: var(--ink);
        }

        .score-input {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            text-align: center;
        }

        .plus-button,
        .mute-button {
            border: 0;
            border-radius: 18px;
            color: white;
            cursor: pointer;
            font-weight: 900;
        }

        .plus-button {
            min-height: 120px;
            font-size: 4rem;
            background: linear-gradient(160deg, var(--green-a), var(--green-b));
        }

        .shared-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .preview-header {
            display: flex;
            align-items: baseline;
            justify-content: flex-start;
        }

        .preview-title {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 900;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .preview-stage {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: #12181d;
        }

        .preview-frame,
        .overlay-mockup {
            width: 100%;
            height: 100%;
            border: 0;
        }

        .overlay-mockup {
            position: relative;
            display: grid;
            overflow: hidden;
            padding: 18px;
            background:
                radial-gradient(circle at top center, rgba(14, 154, 127, 0.18), transparent 35%),
                linear-gradient(180deg, #1b262d 0%, #10171c 100%);
        }

        .overlay-mockup::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.04)),
                repeating-linear-gradient(
                    90deg,
                    transparent 0,
                    transparent calc(12.5% - 1px),
                    rgba(255, 255, 255, 0.05) calc(12.5% - 1px),
                    rgba(255, 255, 255, 0.05) 12.5%
                );
            opacity: 0.35;
            pointer-events: none;
        }

        .overlay-rink {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            color: rgba(255, 255, 255, 0.12);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        .overlay-chip {
            position: absolute;
            max-width: calc(50% - 24px);
            padding: 8px 12px;
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: clamp(0.8rem, 1.7vw, 1rem);
            font-weight: 800;
            line-height: 1.2;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
        }

        .overlay-chip.home {
            top: 16px;
            left: 16px;
        }

        .overlay-chip.away {
            top: 16px;
            right: 16px;
            text-align: right;
        }

        .overlay-chip.time {
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
        }

        .overlay-chip.period {
            left: 16px;
            bottom: 16px;
        }

        .overlay-muted {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            color: rgba(255, 255, 255, 0.42);
            font-size: clamp(2.7rem, 8vw, 5.6rem);
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            pointer-events: none;
        }

        .overlay-muted-badge {
            padding: 16px 24px;
            border-radius: 24px;
            background: rgba(0, 0, 0, 0.12);
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .meta {
            display: grid;
            gap: 8px;
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(31, 26, 23, 0.05);
        }

        .meta-label {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .meta-value {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 900;
        }

        .status-line {
            font-size: 1rem;
            font-weight: 700;
        }

        .option-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(31, 26, 23, 0.05);
            font-weight: 700;
        }

        .team-option {
            justify-content: center;
            min-height: 68px;
        }

        .option-row input[type="checkbox"] {
            width: 24px;
            height: 24px;
            margin: 0;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .mute-button {
            padding: 16px 20px;
            font-size: 1rem;
        }

        .mute-button {
            background: linear-gradient(160deg, var(--steel-a), var(--steel-b));
        }

        .toggle-button {
            width: 100%;
            min-height: 116px;
            border: 0;
            border-radius: 28px;
            font-size: clamp(2.8rem, 9vw, 5.5rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            color: white;
            cursor: pointer;
            transition: transform 120ms ease, background 200ms ease;
            background: linear-gradient(160deg, var(--green-a), var(--green-b));
        }

        .toggle-button.stopped {
            background: linear-gradient(160deg, var(--red-a), var(--red-b));
        }

        .toggle-button:active,
        .plus-button:active,
        .mute-button:active {
            transform: scale(0.99);
        }

        .is-hidden {
            display: none;
        }

        .is-disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        @media (max-width: 1100px) {
            .board {
                grid-template-columns: 1fr 1fr;
                grid-template-areas:
                    "toggle toggle"
                    "left right"
                    "preview preview"
                    "settings settings";
            }

            .toggle-button {
                min-height: 108px;
            }
        }

        @media (max-width: 720px) {
            .board {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "toggle"
                    "left"
                    "preview"
                    "right"
                    "settings"
                    ;
            }

            .shared-grid,
            .settings-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <form id="overlay-form" class="board">
            <section class="panel toggle-panel">
                <button id="start-stop-button" class="toggle-button stopped" type="button">Start</button>
            </section>

            <section class="panel team-panel left">
                <h2 id="home-team-heading" class="team-heading">Home</h2>
                <label>
                    Score
                    <input type="text" id="home-score" class="score-input" value="0" inputmode="numeric">
                </label>
                <div class="team-flags">
                    <label class="option-row team-option">
                        <input type="checkbox" id="home-pp">
                        <span>PP</span>
                    </label>
                    <label class="option-row team-option">
                        <input type="checkbox" id="home-en">
                        <span>EN</span>
                    </label>
                </div>
                <button type="button" id="home-plus" class="plus-button">+</button>
            </section>

            <section class="panel team-panel right">
                <h2 id="away-team-heading" class="team-heading right">Away</h2>
                <label>
                    Score
                    <input type="text" id="away-score" class="score-input" value="0" inputmode="numeric">
                </label>
                <div class="team-flags">
                    <label class="option-row team-option">
                        <input type="checkbox" id="away-pp">
                        <span>PP</span>
                    </label>
                    <label class="option-row team-option">
                        <input type="checkbox" id="away-en">
                        <span>EN</span>
                    </label>
                </div>
                <button type="button" id="away-plus" class="plus-button">+</button>
            </section>

            <section class="panel preview-panel">
                <div class="preview-header">
                    <h3 class="preview-title">Preview</h3>
                </div>
                <div class="preview-stage">
                    <iframe
                        id="preview-frame"
                        class="preview-frame"
                        title="Live preview"
                        allow="autoplay; fullscreen; picture-in-picture"
                    ></iframe>
                    <div id="overlay-mockup" class="overlay-mockup is-hidden" aria-live="polite">
                        <div class="overlay-rink">Overlay Preview</div>
                        <div id="overlay-home" class="overlay-chip home">Home: 0</div>
                        <div id="overlay-time" class="overlay-chip time">20:00</div>
                        <div id="overlay-away" class="overlay-chip away">Away: 0</div>
                        <div id="overlay-period" class="overlay-chip period">Period 1</div>
                        <div id="overlay-muted" class="overlay-muted is-hidden">
                            <div class="overlay-muted-badge">Muted</div>
                        </div>
                    </div>
                </div>
                <label class="option-row">
                    <input type="checkbox" id="show-video" checked>
                    <span>Show video</span>
                </label>
                <div class="visually-hidden" aria-hidden="true">
                    <div id="time-display" class="meta-value">20:00</div>
                </div>
            </section>

            <section class="panel settings-panel">
                <div class="settings-grid">
                    <label>
                        Period
                        <select id="period">
                            <option value="Warmup">Warmup</option>
                            <option value="Period 1" selected>Period 1</option>
                            <option value="Period 2">Period 2</option>
                            <option value="Flood">Flood</option>
                            <option value="Period 3">Period 3</option>
                            <option value="Final">Final</option>
                            <option value="OT">OT</option>
                            <option value="Shootout">Shootout</option>
                        </select>
                    </label>
                    <label>
                        Time
                        <input type="text" id="time" value="20:00">
                    </label>
                </div>
                <label class="option-row">
                    <input type="checkbox" id="mute-on-stop" checked>
                    <span>Mute on Stop</span>
                </label>
                <div class="input-audio-panel">
                    <div class="audio-copy">
                        <div class="audio-label">Incoming RTMP Audio</div>
                        <div id="incoming-audio-label" class="audio-value">Waiting for stream</div>
                    </div>
                    <div class="meter-track" aria-hidden="true">
                        <div id="incoming-audio-meter" class="meter-fill is-silent"></div>
                    </div>
                </div>
                <div class="audio-panel">
                    <div class="audio-copy">
                        <div class="audio-label">Program Audio</div>
                        <div id="audio-state" class="audio-value">Muted</div>
                        <div id="status-text" class="status-line">Stopped</div>
                    </div>
                    <button type="button" id="mute-toggle-button" class="mute-button is-hidden">Un-mute</button>
                </div>
                <div class="youtube-panel">
                    <div class="audio-copy">
                        <div class="audio-label">YouTube</div>
                        <div id="youtube-status" class="audio-value">Not connected</div>
                        <div id="youtube-detail" class="status-line">Create a stream when you are ready to go live.</div>
                    </div>
                    <div class="youtube-actions">
                        <button type="button" id="create-stream-button" class="youtube-button">Create New Stream</button>
                    </div>
                    <div id="youtube-channel-list" class="channel-list"></div>
                    <a id="youtube-broadcast-link" class="youtube-link is-hidden" href="#" target="_blank" rel="noopener noreferrer">Open YouTube broadcast</a>
                </div>
                <div class="settings-grid">
                    <label>
                        Left Team
                        <input type="text" id="home-team" value="Home">
                    </label>
                    <label>
                        Right Team
                        <input type="text" id="away-team" value="Away">
                    </label>
                </div>
            </section>

        </form>
    </div>
    <script src="/static/js/app.js?v=20260327c"></script>
</body>
</html>
