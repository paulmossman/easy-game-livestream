services:
  mediamtx:
    image: bluenviron/mediamtx:v1.16.3@sha256:9e39256d1ba35f0063700c6f62dd32e6db4592ddd9560d78f409ec451d79b1d8
    ports:
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
      - "8189:8189/tcp"
    environment:
      - MTX_WEBRTCADDITIONALHOSTS=${MTX_WEBRTCADDITIONALHOSTS:-}
      - MTX_WEBRTCLOCALTCPADDRESS=${MTX_WEBRTCLOCALTCPADDRESS:-:8189}
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    command: ["/mediamtx.yml"]
    restart: unless-stopped

  app:
    build: .
    ports:
      - "5001:5000"
    depends_on:
      - mediamtx
    environment:
      - FLASK_ENV=development
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    restart: unless-stopped
