services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    command: ["/mediamtx.yml"]
    restart: unless-stopped

  app:
    build: .
    ports:
      - "5001:5000"
    depends_on:
      - mediamtx
    environment:
      - FLASK_ENV=development
      - YOUTUBE_STREAM_KEY=${YOUTUBE_STREAM_KEY}
    volumes:
      - ./config:/app/config:ro
    restart: unless-stopped
